<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XiYuMax | 个人主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        body {
            background: linear-gradient(-45deg, #1a2980, #26d0ce, #1a2980, #667eea);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            padding: 20px;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1s ease forwards;
        }
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #fff;
            margin: 0 auto 20px;
            overflow: hidden;
            border: 3px solid rgba(255, 255, 255, 0.3);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255,255,255,0.4); }
            70% { box-shadow: 0 0 0 10px rgba(255,255,255,0); }
            100% { box-shadow: 0 0 0 0 rgba(255,255,255,0); }
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 600;
            animation: slideIn 1.2s ease forwards;
            opacity: 0;
        }
        @keyframes slideIn {
            to { opacity: 1; transform: translateX(0); }
            from { transform: translateX(-20px); opacity: 0; }
        }
        .tagline {
            font-size: 16px;
            opacity: 0.9;
            margin-bottom: 30px;
            line-height: 1.6;
            animation: slideIn 1.4s ease forwards;
            opacity: 0;
        }
        .links {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }
        .link-btn {
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            text-decoration: none;
            border-radius: 30px;
            transition: all 0.3s ease;
            font-size: 15px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            opacity: 0;
            animation: btnFadeIn 1.6s ease forwards;
        }
        .link-btn:nth-child(1) { animation-delay: 0.2s; }
        .link-btn:nth-child(2) { animation-delay: 0.4s; }
        .link-btn:nth-child(3) { animation-delay: 0.6s; }
        @keyframes btnFadeIn {
            to { opacity: 1; transform: translateY(0); }
            from { transform: translateY(10px); opacity: 0; }
        }
        .link-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        .footer {
            margin-top: 30px;
            font-size: 13px;
            opacity: 0.7;
            animation: fadeIn 2s ease forwards;
            opacity: 0;
        }
        @keyframes fadeIn {
            to { opacity: 0.7; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="avatar">
            < img src="https://avatars.githubusercontent.com/u/19403034?v=4" alt="头像">
        </div>

        <h1>大家好，我是 XiYuMax 👋</h1>
        <p class="tagline">
            用心生活，不断探索<br>
            分享日常与实用资源，一路前行
        </p >

        <div class="links">
            <a href=" " class="link-btn">代码仓库</a >
            <a href="#" class="link-btn">日常分享</a >
            <a href="#" class="link-btn">联系我</a >
        </div>

        <div class="footer">
            © 2026 XiYuMax | 本站由 GitHub Pages 免费搭建
        </div>
    </div>
</body>
</html>
